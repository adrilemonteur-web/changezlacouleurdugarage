<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testeur & Pipette de Couleurs</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .menu {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
            margin-bottom: 20px;
        }
        input[type="color"] {
            vertical-align: middle;
            cursor: pointer;
        }
        button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
            font-weight: bold;
        }
        .debug-info {
            margin-top: 10px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 4px;
            font-family: monospace;
            font-size: 16px;
        }
        canvas {
            border: 2px dashed #ccc;
            background-color: white;
            max-width: 100%;
            border-radius: 4px;
            cursor: crosshair; /* Curseur en forme de croix pour la pipette */
        }
    </style>
</head>
<body>

    <div class="menu">
        <label for="colorPicker">Tester une nouvelle couleur :</label>
        <input type="color" id="colorPicker" value="#ff0000">
        <!-- J'ai ajouté un champ pour que tu puisses modifier la couleur cible facilement -->
        <label for="targetColor" style="margin-left: 15px;">Couleur à remplacer :</label>
        <input type="text" id="targetColor" value="#444750" size="7">
        
        <button id="applyColor">Remplacer</button>
        <button id="resetImage" style="background-color: #6c757d;">Réinitialiser</button>
        
        <div class="debug-info" id="debugText">
            🔍 Mode Pipette actif : Clique n'importe où sur l'image pour voir son code couleur exact.
        </div>
    </div>

    <br>
    <canvas id="myCanvas">Ton navigateur ne supporte pas le canvas.</canvas>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const targetColorInput = document.getElementById('targetColor');
        const debugText = document.getElementById('debugText');

        let originalImageData = null;

        const img = new Image();
        img.src = 'photo.png';

        img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            try {
                originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            } catch (error) {
                console.error("Erreur CORS :", error);
                debugText.innerHTML = "❌ <b>Erreur CORS !</b> Tu dois utiliser Live Server (VS Code) pour que ça marche.";
                debugText.style.color = "red";
            }
        };

        // --- OUTIL PIPETTE ---
        // Permet de cliquer sur l'image pour obtenir la couleur exacte
        canvas.addEventListener('click', function(event) {
            if (!originalImageData) return;
            
            const rect = canvas.getBoundingClientRect();
            // Calculer les coordonnées exactes du clic par rapport au canvas
            const x = Math.floor((event.clientX - rect.left) * (canvas.width / rect.width));
            const y = Math.floor((event.clientY - rect.top) * (canvas.height / rect.height));
            
            // Récupérer le pixel cliqué
            const pixel = ctx.getImageData(x, y, 1, 1).data;
            const r = pixel[0];
            const g = pixel[1];
            const b = pixel[2];
            
            // Convertir en Hexadécimal
            const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
            
            debugText.innerHTML = `Couleur cliquée : <b>${hex}</b> (R:${r}, G:${g}, B:${b})`;
            
            // Mettre à jour automatiquement le champ cible
            targetColorInput.value = hex;
        });

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
        }

        document.getElementById('applyColor').addEventListener('click', function() {
            if (!originalImageData) return;

            const newColor = hexToRgb(colorPicker.value);
            const targetColorRgb = hexToRgb(targetColorInput.value);
            
            if (!targetColorRgb) {
                alert("Code couleur cible invalide !");
                return;
            }

            const imageData = new ImageData(
                new Uint8ClampedArray(originalImageData.data),
                originalImageData.width,
                originalImageData.height
            );
            
            const data = imageData.data;

            let pixelsReplaces = 0;

            for (let i = 0; i < data.length; i += 4) {
                if (data[i] === targetColorRgb.r && data[i + 1] === targetColorRgb.g && data[i + 2] === targetColorRgb.b) {
                    data[i]     = newColor.r;    
                    data[i + 1] = newColor.g;     
                    data[i + 2] = newColor.b;
                    pixelsReplaces++;
                }
            }

            ctx.putImageData(imageData, 0, 0);
            debugText.innerHTML = `✅ ${pixelsReplaces} pixels remplacés !`;
        });

        document.getElementById('resetImage').addEventListener('click', function() {
            if (originalImageData) {
                ctx.putImageData(originalImageData, 0, 0);
                debugText.innerHTML = "Image réinitialisée.";
            }
        });
    </script>
</body>
</html>

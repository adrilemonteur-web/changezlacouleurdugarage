<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur 3D - Portes de Garage</title>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --surface-color: #ffffff;
            --primary-color: #2563eb;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .sidebar {
            width: 340px;
            background: var(--surface-color);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
            z-index: 10;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: auto;
            align-items: center;
            background-color: #e2e8f0;
            padding: 20px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            background: white;
            border-radius: 4px;
        }

        .control-group {
            background: var(--bg-color);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        select, input[type="color"], input[type="range"] {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        button {
            padding: 10px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #1d4ed8; }
        
        .status { font-size: 0.85rem; color: #64748b; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Simulateur Garage</h2>
        <p class="status">Plaquage de texture + couleur</p>

        <div class="control-group">
            <label>1. Choisir une couleur RAL</label>
            <select id="ralSelector">
                <option value="#373F43">RAL 7016 (Gris anthracite)</option>
                <option value="#D7D7D7">RAL 7035 (Gris clair)</option>
                <option value="#F1ECE1">RAL 9010 (Blanc pur)</option>
                <option value="#20214F">RAL 5002 (Bleu outremer)</option>
                <option value="#AF2B1E">RAL 3000 (Rouge feu)</option>
                <option value="#45322E">RAL 8017 (Brun chocolat)</option>
                <option value="#57A639">RAL 6018 (Vert jaune)</option>
            </select>
            
            <label>Ou couleur personnalisée :</label>
            <input type="color" id="colorPicker" value="#373F43">
        </div>

        <div class="control-group">
            <label>2. Intensité de la couleur</label>
            <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="0.6">
        </div>

        <button id="applyBtn">Appliquer la simulation</button>
        <button id="resetBtn" style="background:#64748b;">Réinitialiser la photo</button>
        
    </div>

    <div class="main-content">
        <canvas id="myCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const ralSelector = document.getElementById('ralSelector');
        const opacitySlider = document.getElementById('opacitySlider');
        
        let img = new Image();
        let texture = new Image();
        let imagesLoaded = 0;

        // Les coordonnées exactes des portes fournies
        const garage1 = [
            {x: 326, y: 670},   // HG1
            {x: 1090, y: 671},  // HD1
            {x: 1088, y: 1037}, // BD1
            {x: 327, y: 1054}   // BG1
        ];

        const garage2 = [
            {x: 1224, y: 664},  // HG2
            {x: 1888, y: 668},  // HD2
            {x: 1895, y: 1015}, // BD2
            {x: 1224, y: 1027}  // BG2
        ];

        // Charger les images (Renomme tes fichiers comme ceci dans ton dossier)
        img.src = 'photo2.jpg';
        texture.src = 'texture.jpg'; 

        function checkLoad() {
            imagesLoaded++;
            if (imagesLoaded === 2) drawOriginal();
        }

        img.onload = checkLoad;
        texture.onload = checkLoad;

        function drawOriginal() {
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
        }

        // Synchronisation du menu déroulant avec la pastille de couleur
        ralSelector.addEventListener('change', function() {
            if (this.value) colorPicker.value = this.value;
            applySimulation(); // Applique direct au changement
        });
        
        colorPicker.addEventListener('change', applySimulation);
        opacitySlider.addEventListener('input', applySimulation);

        // Création du masque (clipping path) pour délimiter la zone exacte de la porte
        function createMask(points) {
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            ctx.lineTo(points[1].x, points[1].y);
            ctx.lineTo(points[2].x, points[2].y);
            ctx.lineTo(points[3].x, points[3].y);
            ctx.closePath();
        }

        function applySimulation() {
            if (imagesLoaded < 2) return;
            
            // 1. Redessiner la maison vierge
            drawOriginal();
            const color = colorPicker.value;
            const colorOpacity = opacitySlider.value;
            
            // 2. Fonction d'application pour une porte
            function applyToDoor(points) {
                ctx.save(); // Sauvegarder l'état (avant le masque)
                
                // Découper la zone d'action (Rien ne dépassera de ce polygone)
                createMask(points);
                ctx.clip();
                
                // Trouver la boîte englobante pour étirer la texture proprement
                const minX = Math.min(points[0].x, points[3].x);
                const minY = Math.min(points[0].y, points[1].y);
                const maxX = Math.max(points[1].x, points[2].x);
                const maxY = Math.max(points[2].y, points[3].y);
                const width = maxX - minX;
                const height = maxY - minY;
                
                // --- ÉTAPE A : Peindre la couleur de base ---
                ctx.fillStyle = color;
                ctx.fill();
                
                // --- ÉTAPE B : Appliquer la texture 2D ---
                // Le mode 'multiply' permet à la texture de s'incruster dans la couleur comme une ombre
                ctx.globalCompositeOperation = 'multiply';
                ctx.drawImage(texture, minX, minY, width, height);
                
                // --- ÉTAPE C : Renforcer la couleur RAL ---
                // Repasse une couche de couleur par dessus avec opacité réglable pour cacher le blanc de la texture
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = color;
                ctx.globalAlpha = parseFloat(colorOpacity); 
                ctx.fill();

                ctx.restore(); // Annuler le masque pour passer à l'autre porte
            }

            // Lancer la magie sur les deux portes
            applyToDoor(garage1);
            applyToDoor(garage2);
        }

        document.getElementById('applyBtn').addEventListener('click', applySimulation);
        document.getElementById('resetBtn').addEventListener('click', drawOriginal);
    </script>
</body>
</html>

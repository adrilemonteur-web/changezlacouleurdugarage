<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur 3D - Portes de Garage</title>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --surface-color: #ffffff;
            --primary-color: #2563eb;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .sidebar {
            width: 340px;
            background: var(--surface-color);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
            z-index: 10;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: auto;
            align-items: center;
            background-color: #e2e8f0;
            padding: 20px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            background: white;
            border-radius: 4px;
        }

        .control-group {
            background: var(--bg-color);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        select, input[type="color"] {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            outline: none;
        }
        
        select:focus { border-color: var(--primary-color); }

        button {
            padding: 10px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #1d4ed8; }
        
        .status { font-size: 0.85rem; color: #64748b; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Simulateur Garage</h2>
        <p class="status">Plaquage de texture + couleur</p>

        <div class="control-group">
            <label>1. Choisir une couleur RAL</label>
            <select id="ralSelector">
                <option value="">-- Choisir un RAL (213 couleurs) --</option>
            </select>
            
            <label style="margin-top: 10px;">Ou couleur personnalisée :</label>
            <input type="color" id="colorPicker" value="#373F43">
        </div>

        <button id="applyBtn">Appliquer la simulation</button>
        <button id="resetBtn" style="background:#64748b;">Réinitialiser la photo</button>
    </div>

    <div class="main-content">
        <canvas id="myCanvas"></canvas>
    </div>

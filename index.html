<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testeur de Couleurs de Pixels</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .menu {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: inline-block;
            margin-bottom: 20px;
        }
        input[type="color"] {
            vertical-align: middle;
            cursor: pointer;
        }
        button {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        canvas {
            border: 2px dashed #ccc;
            background-color: white;
            max-width: 100%;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="menu">
        <label for="colorPicker">Tester une nouvelle couleur :</label>
        <input type="color" id="colorPicker" value="#ff0000">
        <button id="applyColor">Remplacer #444750</button>
        <button id="resetImage" style="background-color: #6c757d;">Réinitialiser</button>
    </div>

    <br>
    <canvas id="myCanvas">Ton navigateur ne supporte pas le canvas.</canvas>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        
        // La nouvelle couleur cible : #444750
        const targetR = parseInt('44', 16); // 68
        const targetG = parseInt('47', 16); // 71
        const targetB = parseInt('50', 16); // 80

        let originalImageData = null;

        const img = new Image();
        img.src = 'photo.png';

        img.onload = function() {
            canvas.width = img.width;
            canvas.height = img.height;
            
            ctx.drawImage(img, 0, 0);
            
            try {
                originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            } catch (error) {
                console.error("Erreur CORS bloquant la lecture des pixels :", error);
                alert("Erreur de sécurité : Utilise Live Server pour tester ton code localement.");
            }
        };

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        document.getElementById('applyColor').addEventListener('click', function() {
            if (!originalImageData) return;

            const newColor = hexToRgb(colorPicker.value);
            
            const imageData = new ImageData(
                new Uint8ClampedArray(originalImageData.data),
                originalImageData.width,
                originalImageData.height
            );
            
            const data = imageData.data;

            // Parcourir tous les pixels
            for (let i = 0; i < data.length; i += 4) {
                // Correspondance stricte pour la couleur #444750
                if (data[i] === targetR && data[i + 1] === targetG && data[i + 2] === targetB) {
                    data[i]     = newColor.r;    
                    data[i + 1] = newColor.g;     
                    data[i + 2] = newColor.b;     
                }
            }

            ctx.putImageData(imageData, 0, 0);
        });

        document.getElementById('resetImage').addEventListener('click', function() {
            if (originalImageData) {
                ctx.putImageData(originalImageData, 0, 0);
            }
        });
    </script>
</body>
</html>

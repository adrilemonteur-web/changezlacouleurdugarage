<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur de Pixels Pro | Studio</title>
    <style>
        :root {
            --bg-color: #f7f9fc;
            --surface-color: #ffffff;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 340px;
            background: var(--surface-color);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
            overflow-y: auto;
            z-index: 10;
        }

        .header h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 4px; }
        .header p { font-size: 0.85rem; color: var(--text-muted); }

        .control-group {
            background: var(--bg-color);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-main); }

        input[type="text"], select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, select:focus { border-color: var(--primary-color); }

        .color-picker-wrapper { display: flex; align-items: center; gap: 10px; }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            padding: 0;
            overflow: hidden;
        }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border-color); border-radius: 6px; }

        button {
            padding: 10px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }

        .btn-secondary { background-color: white; color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background-color: var(--bg-color); }

        .btn-success { background-color: var(--success); color: white; margin-top: auto; }
        .btn-success:hover { background-color: #059669; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .canvas-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
            cursor: grab;
            background-color: #e2e8f0;
            background-image: 
                linear-gradient(45deg, #cbd5e1 25%, transparent 25%), 
                linear-gradient(-45deg, #cbd5e1 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #cbd5e1 75%), 
                linear-gradient(-45deg, transparent 75%, #cbd5e1 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .canvas-wrapper:active { cursor: grabbing; }

        canvas {
            position: absolute;
            transform-origin: 0 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .pipette-mode { cursor: crosshair !important; }

        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.95);
            color: #0f172a;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            z-index: 20;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 5px;
            background: rgba(255, 255, 255, 0.95);
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 20;
        }
        
        .zoom-btn {
            padding: 5px 10px;
            background: transparent;
            color: var(--text-main);
            border: none;
            cursor: pointer;
        }
        .zoom-btn:hover { background: var(--bg-color); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h1>Éditeur de Pixels</h1>
            <p>Remplacement chromatique avec zoom</p>
        </div>

        <div class="control-group">
            <label>1. Couleur cible (Pipette)</label>
            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top:-8px;"><b>MAINTIENS SHIFT + CLIC</b> sur l'image pour utiliser la pipette</p>

        <div class="control-group">
            <label>2. Nouvelle couleur (Remplacement)</label>

                <input type="text" id="hexDisplay" value="#2563eb" readonly style="background: var(--bg-color); color: var(--text-muted);">
            </div>

            <label style="margin-top: 10px;">Catalogue complet RAL Classic :</label>
            <select id="ralSelector">
                <option value="">-- Choisir un RAL (213 couleurs) --</option>
            </select>
        </div>

        <button id="applyColor" class="btn-primary">Appliquer le remplacement</button>
        <button id="resetImage" class="btn-secondary">Réinitialiser l'image</button>
        <button id="downloadBtn" class="btn-success">Télécharger (.png)</button>
    </div>

    <div class="main-content">
        <div class="canvas-wrapper" id="canvasWrapper">

        </div>
        
        <div class="status-bar" id="statusText">

        <div class="zoom-controls">

            <span style="display:flex; align-items:center; font-size:0.8rem; font-weight:bold; min-width: 40px; justify-content:center;" id="zoomLevelText">100%</span>
            <button class="zoom-btn" id="zoomInBtn">+</button>

    </div>
